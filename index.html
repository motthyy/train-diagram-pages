<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>鉄道ダイヤグラム</title>
  <style>

      --font-ui: 'BIZ UDPGothic', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      --font-display: 'Avenir Next', 'BIZ UDPGothic', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      --header-h: 58px;
      --sidebar-w: 108px;
      --bg-top: #dfead8;
      --bg-bottom: #f7f2e5;
      --panel-dark: rgba(20, 53, 40, 0.94);
      --panel-dark-2: rgba(31, 69, 54, 0.96);
      --panel-plain: rgba(255, 250, 240, 0.74);
      --panel-border: rgba(255, 244, 221, 0.16);
      --panel-stroke: #315f4d;
      --text-main: #f8f4e8;
      --text-muted: #d7d0bb;
      --text-soft: #5e645c;
      --accent: #c56b33;
      --accent-soft: rgba(197, 107, 51, 0.14);
      --shadow-lg: 0 18px 36px rgba(53, 56, 43, 0.16);
      --shadow-sm: 0 10px 20px rgba(19, 33, 25, 0.18);
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: var(--font-ui);
      background:
        radial-gradient(circle at top right, rgba(197, 107, 51, 0.16), transparent 28%),
        radial-gradient(circle at bottom left, rgba(53, 96, 73, 0.14), transparent 32%),
        linear-gradient(160deg, var(--bg-top) 0%, #ece5d3 48%, var(--bg-bottom) 100%);
      color: var(--text-main);
      overflow: hidden;
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14) 0, rgba(255, 255, 255, 0.14) 1px, transparent 1px, transparent 56px),
        linear-gradient(rgba(255, 255, 255, 0.10) 0, rgba(255, 255, 255, 0.10) 1px, transparent 1px, transparent 56px);
      opacity: 0.14;
      pointer-events: none;
    }

    button, select, canvas {
      font: inherit;
    }

    #shell {
      position: relative;
      z-index: 1;
      height: 100dvh;
      padding:
        max(6px, env(safe-area-inset-top))
        max(6px, env(safe-area-inset-right))
        max(6px, env(safe-area-inset-bottom))
        max(6px, env(safe-area-inset-left));
    }

    .panel-card {
      background: var(--panel-dark);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #topbar {
      display: none;
    }

    #line-selector {
      position: absolute;
      top: max(8px, env(safe-area-inset-top));
      right: max(8px, env(safe-area-inset-right));
      z-index: 30;
      width: min(60vw, 220px);
      padding: 6px;
    }

    #line-selector label {
      display: none;
    }

    .selector-row {
      display: block;
    }

    .select-wrap {
      position: relative;
      min-width: 0;
    }

    .select-wrap::after {
      content: '⌄';
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-55%);
      font-size: 15px;
      color: var(--text-muted);
      pointer-events: none;
    }

    #line-selector select {
      width: 100%;
      appearance: none;
      border: 1px solid rgba(255, 248, 230, 0.18);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255, 248, 230, 0.14), rgba(255, 248, 230, 0.08));
      color: var(--text-main);
      padding: 8px 28px 8px 10px;
      font-size: 13px;
      font-weight: 700;
      outline: none;
      cursor: pointer;
      min-width: 0;
      line-height: 1.2;
    }

    #data-summary {
      display: none;
    }

    #controls {
      display: none;
    }

    .btn {
      min-width: 84px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 248, 230, 0.16);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 248, 230, 0.18), rgba(255, 248, 230, 0.08));
      color: var(--text-main);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), var(--shadow-sm);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .btn:hover {
      background: linear-gradient(180deg, rgba(255, 248, 230, 0.22), rgba(255, 248, 230, 0.12));
      border-color: rgba(255, 248, 230, 0.22);
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .btn-symbol {
      font-size: 22px;
      line-height: 1;
    }

    .btn-text {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    #legend {
      position: absolute;
      right: max(8px, env(safe-area-inset-right));
      bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 30;
      width: min(54vw, 240px);
      padding: 6px 8px;
    }

    .legend-copy {
      display: none;
    }

    .legend-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .legend-note {
      color: var(--text-main);
      font-size: 13px;
      line-height: 1.4;
    }

    .legend-items {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 6px;
      min-width: 0;
    }

    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(255, 248, 230, 0.12);
      border: 1px solid rgba(255, 248, 230, 0.14);
      color: var(--text-main);
      font-size: 10px;
      line-height: 1.15;
      white-space: nowrap;
    }

    .legend-chip .line-sample {
      width: 14px;
      height: 3px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    #app {
      display: grid;
      grid-template-rows: var(--header-h) minmax(0, 1fr);
      grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
      height: 100%;
      min-height: 0;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(32, 58, 45, 0.14);
      background: var(--panel-plain);
      box-shadow: var(--shadow-lg);
    }

    #corner {
      background: linear-gradient(180deg, var(--panel-dark-2), var(--panel-dark));
      border-right: 1px solid var(--panel-stroke);
      border-bottom: 1px solid var(--panel-stroke);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 2px;
      padding: 8px 10px;
      z-index: 10;
    }

    #corner .line-label {
      color: var(--text-muted);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    #corner .line-name {
      color: var(--text-main);
      font-size: clamp(11px, 1.6vw, 15px);
      font-weight: 700;
      line-height: 1.25;
    }

    #time-header {
      background: linear-gradient(180deg, var(--panel-dark-2), var(--panel-dark));
      border-bottom: 1px solid var(--panel-stroke);
      overflow: hidden;
      position: relative;
    }

    #station-sidebar {
      background: linear-gradient(180deg, var(--panel-dark-2), var(--panel-dark));
      border-right: 1px solid var(--panel-stroke);
      overflow: hidden;
      position: relative;
    }

    #diagram-area {
      overflow: hidden;
      position: relative;
      cursor: grab;
      background: #fffaf0;
      touch-action: none;
      user-select: none;
    }

    #diagram-area:active {
      cursor: grabbing;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: rgba(20, 53, 40, 0.86);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      font-size: 16px;
      gap: 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #loading.hidden {
      display: none;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(255, 248, 230, 0.24);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;

        --header-h: 54px;

        --header-h: 50px;

      #shell {

          max(3px, env(safe-area-inset-right))
          max(3px, env(safe-area-inset-bottom))
          max(3px, env(safe-area-inset-left));

      #app {
        border-radius: 14px;
      }

      #corner {
        padding: 6px 8px;
      }

      #line-selector {
        width: min(52vw, 184px);
      }

      #line-selector select {
        font-size: 12px;
        padding: 7px 26px 7px 9px;
      }

      #legend {
        width: min(50vw, 180px);
        padding: 5px 6px;
      }

      .legend-items {
        gap: 3px 4px;
      }

      .legend-chip {
        padding: 2px 5px;
        font-size: 9px;
      }

      .legend-chip .line-sample {
        width: 12px;
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

// ============================================================
// 駅名→インデックス マップ（ヶ/ケ 表記揺れ対応）
// ============================================================
const IIDA_ST_MAP = {};
IIDA_STATIONS.forEach((st, i) => {
  IIDA_ST_MAP[st.name] = i;
  IIDA_ST_MAP[st.name.replace(/ヶ/g, 'ケ').replace(/ヵ/g, 'カ')] = i;
});

// ============================================================
// JR東海API → 内部形式 変換ユーティリティ
// ============================================================
function hhmm2t(s) {
  if (!s || s.length < 4) return null;
  const h = parseInt(s.slice(0, 2), 10);
  const m = parseInt(s.slice(2, 4), 10);
  if (isNaN(h) || isNaN(m)) return null;
  return `${h}:${m.toString().padStart(2, '0')}`;
}

function getKind(typeName, trainNo) {
  if (typeName.includes('特急') || typeName.includes('ライナー')) return 'express';
  if (typeName.includes('新快速'))   return 'rapid_new';
  if (typeName.includes('特別快速')) return 'rapid_special';
  if (typeName.includes('区間快速')) return 'rapid_local';
  if (typeName.includes('快速'))     return 'rapid';
  if (/^[1-9]M$/.test(trainNo)) return 'express';
  return 'local';
}

// ============================================================
// JR東海API から飯田線全列車を取得
// ============================================================
async function fetchIidaTrains() {
  const BASE      = 'https://traininfo.jr-central.co.jp/zairaisen/data/';
  const IIDA_CODE = '050080';

  const [kobeRes, zaiRes] = await Promise.all([
    fetch(BASE + 'kobetsujikoku.json', { cache: 'no-store' }),
    fetch(BASE + 'zaisenichi.json',    { cache: 'no-store' }),
  ]);

  const kobeData = await kobeRes.json();
  const zaiData  = await zaiRes.json();

  // 列車識別キー → 種別名マップ（zaisenichi で補完）
  const typeMap = {};
  for (const t of (zaiData.train_info || [])) {
    if (t.train_identification_key)
      typeMap[t.train_identification_key] = t.traintype?.[0]?.name || '';
  }

  const trains = [];

  for (const info of (kobeData.train_info || [])) {
    const key      = info.train_identification_key || '';
    const trainNo  = info.trainnumber || '';
    const typeName = typeMap[key] || info.traintype?.[0]?.name || '';
    const kind     = getKind(typeName, trainNo);

    const stops = [];
    for (const stop of (info.timetable || [])) {
      if (stop.run_line !== IIDA_CODE) continue;
      if (stop.stopthroughkbn === '2') continue; // 通過駅はスキップ

      const stName = (stop.station?.[0]?.name || '').trim();
      const si = IIDA_ST_MAP[stName];
      if (si === undefined) continue;

      const arr = hhmm2t(stop.arrivalTime1   || '');
      const dep = hhmm2t(stop.departureTime1 || '');
      if (arr === null && dep === null) continue;

      stops.push({ si, arr, dep });
    }

    if (stops.length < 2) continue;

    // 0時またぎ補正（最大ギャップ法）
    stops.sort((a, b) => t2m(a.dep || a.arr) - t2m(b.dep || b.arr));
    {
      const firstT = t2m(stops[0].dep || stops[0].arr);
      const lastT  = t2m(stops[stops.length - 1].dep || stops[stops.length - 1].arr);
      if (firstT < 3 * 60 && lastT < 3 * 60) {
        for (const s of stops) {
          if (s.arr) { const [h, m] = s.arr.split(':'); s.arr = `${+h + 24}:${m}`; }
          if (s.dep) { const [h, m] = s.dep.split(':'); s.dep = `${+h + 24}:${m}`; }
        }
      } else {
        let maxGap = 0, splitIdx = -1;
        for (let i = 1; i < stops.length; i++) {
          const gap = t2m(stops[i].dep || stops[i].arr) - t2m(stops[i-1].dep || stops[i-1].arr);
          if (gap > maxGap) { maxGap = gap; splitIdx = i; }
        }
        if (maxGap > 3 * 60 && splitIdx > 0) {
          for (let j = 0; j < splitIdx; j++) {
            if (stops[j].arr) { const [h, m] = stops[j].arr.split(':'); stops[j].arr = `${+h + 24}:${m}`; }
            if (stops[j].dep) { const [h, m] = stops[j].dep.split(':'); stops[j].dep = `${+h + 24}:${m}`; }
          }
          stops.sort((a, b) => t2m(a.dep || a.arr) - t2m(b.dep || b.arr));
        }
      }
    }

    const dir = stops[0].si <= stops[stops.length - 1].si ? 'down' : 'up';
    trains.push({ dir, kind, stops, trainNo });
  }

  return trains;
}

  switch (train.kind) {
    case 'express':       return '#d32f2f'; // 特急：赤
    case 'rapid_new':     return '#e65100'; // 新快速：オレンジ
    case 'rapid_special': return '#7c6f00'; // 特別快速：黒目の黄色
    case 'rapid_local':   return '#2e7d32'; // 区間快速：緑
    case 'rapid':         return '#1565c0'; // 快速：青
    default:              return '#212121'; // 普通：黒
  }
}

const FONT_FAMILY = "'BIZ UDPGothic', 'Hiragino Sans', 'Yu Gothic UI', sans-serif";
const UI_THEME = {
  headerBg: '#143528',
  headerBorder: '#315f4d',
  headerText: '#f8f4e8',
  headerSubText: '#d7d0bb',
  headerMinuteText: '#c6d0c5',

let SIDEBAR_W = 108;     // 駅名列幅 px（後で動的計算）
const PX_PER_MIN = 2.5;  // 1分あたりの基本ピクセル数
const PX_PER_KM  = 8.0;  // 1kmあたりの基本ピクセル数

let currentLine = LINES.iida;

let view = { offsetX: 0, offsetY: 0, scale: 1.0 };

// ============================================================
// ユーティリティ
// ============================================================
function t2m(str) {
  const [h, m] = str.split(':').map(Number);
  return h * 60 + m;
}

function startMin() { return currentLine.startHour * 60; }
function endMin()   { return currentLine.endHour   * 60; }

function xOfMin(min) {
  return (min - startMin()) * PX_PER_MIN * view.scale + view.offsetX;
}

function yOfKm(km) {
  return km * PX_PER_KM * view.scale + view.offsetY;
}

function isCompactViewport() {
  return window.innerWidth <= 560;
}

function updateLineChrome() {
  const lineName = document.getElementById('line-name-display');
  if (lineName) lineName.textContent = currentLine.name;
}

function updateDataSummary(text) {
  const summary = document.getElementById('data-summary');
  if (summary) summary.textContent = text;
}

// ============================================================

function resizeAll() {

// ============================================================
// 描画: 時間軸ヘッダー
// ============================================================
function drawTimeHeader() {
  const ctx = timeCtx;
  const w = timeCanvas.width, h = timeCanvas.height;
  ctx.clearRect(0, 0, w, h);

  ctx.fillStyle = UI_THEME.headerBg;
  ctx.fillRect(0, 0, w, h);

  const overnightStart = Math.max(startMin(), 24 * 60);
  if (overnightStart < endMin()) {
    const ox0 = xOfMin(overnightStart);
    const ox1 = xOfMin(endMin());
    ctx.fillStyle = UI_THEME.canvasOvernight;
    ctx.fillRect(Math.max(0, ox0), 0, Math.max(0, Math.min(w, ox1) - Math.max(0, ox0)), h);
  }

  const hourFont = isCompactViewport() ? 20 : 24;
  const minorFont = isCompactViewport() ? 10 : 11;
  const canShowMinorLabels = PX_PER_MIN * view.scale * 10 >= 22;

  for (let min = startMin(); min <= endMin(); min++) {
    const x = xOfMin(min);
    if (x < -60 || x > w + 60) continue;
    const moh = min % 60;

    if (moh === 0) {
      const hour = Math.floor(min / 60);
      ctx.fillStyle = hour >= 24 ? '#ffd8b8' : UI_THEME.headerText;
      ctx.font = `700 ${hourFont}px ${FONT_FAMILY}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(hour).padStart(2, '0'), x, h * 0.37);

      ctx.fillStyle = UI_THEME.headerSubText;
      ctx.font = `700 ${minorFont}px ${FONT_FAMILY}`;
      ctx.fillText('00', x, h * 0.72);

      ctx.strokeStyle = UI_THEME.headerBorder;
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(x, h * 0.58);
      ctx.lineTo(x, h);
      ctx.stroke();
    } else if (moh % 10 === 0 && canShowMinorLabels) {
      ctx.fillStyle = UI_THEME.headerMinuteText;
      ctx.font = `600 ${minorFont}px ${FONT_FAMILY}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(moh).padStart(2, '0'), x, h * 0.72);
    }
  }

  ctx.strokeStyle = UI_THEME.headerBorder;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h - 0.5);
  ctx.lineTo(w, h - 0.5);
  ctx.stroke();
}

// ============================================================
// 描画: 駅名サイドバー
// ============================================================
function drawStationSidebar() {
  const ctx = stCtx;
  const w = stCanvas.width, h = stCanvas.height;
  ctx.clearRect(0, 0, w, h);

  ctx.fillStyle = UI_THEME.headerBg;
  ctx.fillRect(0, 0, w, h);

  const stations = currentLine.stations;
  const baseFontSize = Math.min(16, Math.max(12, (isCompactViewport() ? 13 : 14) + (view.scale - 1) * 2));
  const kmFontSize   = Math.min(12, Math.max(9, 10 + (view.scale - 1) * 1.3));
  const minGap = view.scale >= 1.6 ? 18 : view.scale >= 1.0 ? 26 : 38;
  let lastLabelY = -Infinity;

  for (let i = 0; i < stations.length; i++) {
    const st = stations[i];
    const y = yOfKm(st.km);
    if (y < -20 || y > h + 20) continue;

    ctx.strokeStyle = UI_THEME.sidebarTick;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(w - 4, y);
    ctx.lineTo(w, y);
    ctx.stroke();

    const isEndpoint = i === 0 || i === stations.length - 1;
    if (!isEndpoint && y - lastLabelY < minGap) continue;

    const showKm = view.scale >= 1.05 && (isEndpoint || view.scale >= 1.6 || i % 5 === 0);
    const labelY = showKm ? y - 5 : y;

    ctx.fillStyle = UI_THEME.sidebarText;
    ctx.font = `700 ${baseFontSize}px ${FONT_FAMILY}`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(st.name, 12, labelY);

    if (showKm) {
      ctx.fillStyle = UI_THEME.sidebarKmText;
      ctx.font = `600 ${kmFontSize}px ${FONT_FAMILY}`;
      ctx.fillText(`${st.km.toFixed(1)} km`, 12, y + baseFontSize * 0.72);
      lastLabelY = y + baseFontSize * 0.72;
    } else {
      lastLabelY = y;
    }
  }

  ctx.strokeStyle = UI_THEME.headerBorder;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(w - 0.5, 0);
  ctx.lineTo(w - 0.5, h);
  ctx.stroke();
}

// ============================================================
// 描画: メインダイヤグラム
// ============================================================
function drawDiagram() {
  const ctx = diagCtx;
  const w = diagCanvas.width, h = diagCanvas.height;
  ctx.clearRect(0, 0, w, h);

  ctx.fillStyle = UI_THEME.canvasBg;
  ctx.fillRect(0, 0, w, h);

  const stations = currentLine.stations;
  const trains   = currentLine.trains;
  const overnightStart = Math.max(startMin(), 24 * 60);
  const minorGridVisible = PX_PER_MIN * view.scale * 2 >= 7;

  if (overnightStart < endMin()) {
    const ox0 = xOfMin(overnightStart);
    const ox1 = xOfMin(endMin());
    ctx.fillStyle = UI_THEME.canvasOvernight;
    ctx.fillRect(Math.max(0, ox0), 0, Math.max(0, Math.min(w, ox1) - Math.max(0, ox0)), h);
  }

  // ---- 時間グリッド線 ----
  for (let min = startMin(); min <= endMin(); min++) {
    const x = xOfMin(min);
    if (x < 0 || x > w) continue;
    const moh = min % 60;

    if (moh !== 0 && moh % 10 !== 0 && moh % 2 !== 0) continue;
    if (moh % 10 !== 0 && !minorGridVisible) continue;

    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);

    if (moh === 0) {
      ctx.strokeStyle = UI_THEME.gridMajor;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([]);
    } else if (moh % 10 === 0 && moh !== 0) {
      ctx.strokeStyle = UI_THEME.gridMid;
      ctx.lineWidth = 0.6;
      ctx.setLineDash([]);
    } else {
      ctx.strokeStyle = UI_THEME.gridMinor;
      ctx.lineWidth = 0.7;
      ctx.setLineDash([2, 3]);
    }
    ctx.stroke();
  }
  ctx.setLineDash([]);

  for (let i = 0; i < stations.length; i++) {
    const y = yOfKm(stations[i].km);
    if (y < 0 || y > h) continue;
    ctx.strokeStyle = UI_THEME.stationGrid;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  const lineW = Math.max(0.8, Math.min(2.0, 1.4 / Math.sqrt(view.scale)));

  function stopArr(s) { return s.arr ?? s.t ?? null; }
  function stopDep(s) { return s.dep ?? s.t ?? null; }

  for (const train of trains) {
    const stops = train.stops.filter(s => stations[s.si]);
    if (stops.length < 2) continue;

    const color = trainColor(train);
    ctx.strokeStyle = color;
    ctx.lineWidth = train.kind === 'express' ? lineW * 2.0 : lineW;
    ctx.setLineDash([]);
    ctx.beginPath();

    let first = true;
    for (const stop of stops) {
      const y   = yOfKm(stations[stop.si].km);
      const arr = stopArr(stop);
      const dep = stopDep(stop);
      if (arr === null && dep === null) continue;

      const xArr = xOfMin(t2m(arr ?? dep));
      const xDep = xOfMin(t2m(dep ?? arr));

      if (first) { ctx.moveTo(xArr, y); first = false; }
      else        { ctx.lineTo(xArr, y); }

      // 到着→発車の停車時間（横線）
      if (arr !== dep) ctx.lineTo(xDep, y);
    }
    ctx.stroke();

    // 列車番号ラベル（斜線に沿って描画）
    if (train.trainNo && stops.length >= 2 && view.scale >= 0.4) {
      const s0 = stops[0];
      const s1 = stops[1];
      const x0 = xOfMin(t2m(stopDep(s0) ?? stopArr(s0)));
      const y0 = yOfKm(stations[s0.si].km);
      const x1 = xOfMin(t2m(stopArr(s1) ?? stopDep(s1)));
      const y1 = yOfKm(stations[s1.si].km);
      const angle = Math.atan2(y1 - y0, x1 - x0);
      const lx = x0 + Math.cos(angle) * 10;
      const ly = y0 + Math.sin(angle) * 10;
      const size = Math.max(7, Math.min(10, 9 * view.scale));
      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(angle);
      ctx.fillStyle = color;
      ctx.font = `700 ${size}px ${FONT_FAMILY}`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'bottom';
      ctx.fillText(train.trainNo, 0, -2);
      ctx.restore();
    }
  }
}

// ============================================================
// 全体再描画
// ============================================================
function drawAll() {
  drawDiagram();
  drawTimeHeader();
  drawStationSidebar();
}

// ============================================================
// ズーム
// ============================================================
function zoom(factor, cx, cy) {
  const newScale = Math.max(0.15, Math.min(6, view.scale * factor));
  if (cx === undefined) {
    cx = diagCanvas.width  / 2;
    cy = diagCanvas.height / 2;
  }
  const ratio = newScale / view.scale;
  view.offsetX = cx - (cx - view.offsetX) * ratio;
  view.offsetY = cy - (cy - view.offsetY) * ratio;
  view.scale = newScale;
  clamp();
  drawAll();
}

function zoomBtn(f) { zoom(f); }

function resetView() {
  view.offsetX = 0;
  view.offsetY = 0;
  view.scale   = 1.0;
  clamp();
  drawAll();
}

// ============================================================
// マウス操作
// ============================================================
let drag = false, lx = 0, ly = 0;

diagArea.addEventListener('mousedown', e => {
  drag = true; lx = e.clientX; ly = e.clientY;
});
document.addEventListener('mousemove', e => {
  if (!drag) return;
  view.offsetX += e.clientX - lx;
  view.offsetY += e.clientY - ly;
  lx = e.clientX; ly = e.clientY;
  clamp();
  drawAll();
});
document.addEventListener('mouseup', () => { drag = false; });

diagArea.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = diagArea.getBoundingClientRect();
  zoom(e.deltaY < 0 ? 1.1 : 0.9, e.clientX - rect.left, e.clientY - rect.top);
}, { passive: false });

diagArea.addEventListener('dblclick', e => {
  const rect = diagArea.getBoundingClientRect();
  zoom(1.25, e.clientX - rect.left, e.clientY - rect.top);
});

// ============================================================
// タッチ操作（スマホ対応）
// ============================================================
let touches = [], lastDist = 0, lastMidX = 0, lastMidY = 0;
let lastTapTime = 0, lastTapX = 0, lastTapY = 0, touchMoved = false;

diagArea.addEventListener('touchstart', e => {
  e.preventDefault();
  touches = Array.from(e.touches);
  touchMoved = false;
  if (touches.length === 2) {
    lastDist = dist(touches);
    const m = mid(touches);
    lastMidX = m.x; lastMidY = m.y;
  } else if (touches.length === 1) {
    lx = touches[0].clientX; ly = touches[0].clientY;
  }
}, { passive: false });

diagArea.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = Array.from(e.touches);
  const rect = diagArea.getBoundingClientRect();

  if (t.length === 2 && touches.length === 2) {
    const nd = dist(t), nm = mid(t);
    const cx = nm.x - rect.left, cy = nm.y - rect.top;
    if (lastDist > 0) zoom(nd / lastDist, cx, cy);
    view.offsetX += nm.x - lastMidX;
    view.offsetY += nm.y - lastMidY;
    lastDist = nd; lastMidX = nm.x; lastMidY = nm.y;
    touchMoved = true;
  } else if (t.length === 1 && touches.length >= 1) {
    const dx = t[0].clientX - lx;
    const dy = t[0].clientY - ly;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) touchMoved = true;
    view.offsetX += dx;
    view.offsetY += dy;
    lx = t[0].clientX; ly = t[0].clientY;
  }
  touches = t;
  clamp();
  drawAll();
}, { passive: false });

diagArea.addEventListener('touchend', e => {
  const rect = diagArea.getBoundingClientRect();
  const ended = Array.from(e.changedTouches);
  touches = Array.from(e.touches);
  if (touches.length === 0 && ended.length === 1 && !touchMoved) {
    const tap = ended[0];
    const now = Date.now();
    if (now - lastTapTime < 280 && Math.hypot(tap.clientX - lastTapX, tap.clientY - lastTapY) < 28) {
      zoom(1.35, tap.clientX - rect.left, tap.clientY - rect.top);
      lastTapTime = 0;
    } else {
      lastTapTime = now;
      lastTapX = tap.clientX;
      lastTapY = tap.clientY;
    }
  } else if (touches.length === 1) {
    lx = touches[0].clientX;
    ly = touches[0].clientY;
  }
  lastDist = 0;
});

function dist(ts) {
  const dx = ts[0].clientX - ts[1].clientX;
  const dy = ts[0].clientY - ts[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function mid(ts) {
  return {
    x: (ts[0].clientX + ts[1].clientX) / 2,
    y: (ts[0].clientY + ts[1].clientY) / 2,
  };
}

function clamp() {
  const maxX = 50, maxY = 50;
  const totalW = (endMin() - startMin()) * PX_PER_MIN * view.scale;
  const totalH = currentLine.stations.at(-1).km * PX_PER_KM * view.scale;
  view.offsetX = Math.min(maxX, Math.max(-(totalW - diagCanvas.width  + 50), view.offsetX));
  view.offsetY = Math.min(maxY, Math.max(-(totalH - diagCanvas.height + 50), view.offsetY));
}

// ============================================================
// 路線切り替え
// ============================================================
function loadLine(key) {
  if (!LINES[key]) return;
  currentLine = LINES[key];
  updateLineChrome();
  applySidebarWidth(calcSidebarWidth(currentLine.stations));
  resizeAll();
  resetView();
}

// ============================================================
// 初期化
// ============================================================
// ============================================================
// 駅名幅の動的計算
// ============================================================
function calcSidebarWidth(stations) {
  const tmp = document.createElement('canvas').getContext('2d');
  let maxW = 0;
  for (const st of stations) {
    tmp.font = `700 ${isCompactViewport() ? 12 : 14}px ${FONT_FAMILY}`;
    maxW = Math.max(maxW, tmp.measureText(st.name).width);
  }
  const minW = isCompactViewport() ? 88 : 108;
  const maxWLimit = isCompactViewport() ? Math.floor(window.innerWidth * 0.27) : 170;
  return Math.max(minW, Math.min(maxWLimit, Math.ceil(maxW) + (isCompactViewport() ? 16 : 24)));
}

function applySidebarWidth(w) {
  SIDEBAR_W = w;
  document.getElementById('app').style.setProperty('--sidebar-w', w + 'px');
}

window.addEventListener('resize', () => {
  applySidebarWidth(calcSidebarWidth(currentLine.stations));
  resizeAll();
  clamp();
  drawAll();
});

resizeAll();

(async () => {
  const loadingMsg = document.querySelector('#loading div:last-child');

  // ① diagram-data.js が読み込まれている場合（fetch-diagram.ts で生成済み）
  if (window.DIAGRAM_DATA) {
    const d = window.DIAGRAM_DATA;
    const select = document.getElementById('line-select');
    select.innerHTML = '';

    // 新形式: DIAGRAM_DATA.lines = { key: { lineName, stations, trains, ... } }
    if (d.lines) {
      let totalTrains = 0;
      for (const [key, ld] of Object.entries(d.lines)) {
        LINES[key] = {
          name:      ld.lineName,
          startHour: ld.startHour ?? 3,
          endHour:   ld.endHour   ?? 27,
          stations:  ld.stations,
          trains:    ld.trains,
        };
        totalTrains += ld.trains.length;
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = ld.lineName;
        select.appendChild(opt);
      }
      // デフォルト路線（飯田線があれば飯田線、なければ最初の路線）
      const defaultKey = Object.keys(d.lines).find(k => k === 'iida') || Object.keys(d.lines)[0];
      select.value = defaultKey;
      currentLine = LINES[defaultKey];
      updateLineChrome();
      applySidebarWidth(calcSidebarWidth(currentLine.stations));
      updateDataSummary(`${Object.keys(d.lines).length}路線 / ${totalTrains}本`);
      loadingMsg.textContent = `ローカルデータ読込完了（${Object.keys(d.lines).length}路線 / ${totalTrains}本）`;

    // 旧形式: DIAGRAM_DATA.lineKey, .stations, .trains（後方互換）
    } else if (d.lineKey) {
      LINES[d.lineKey] = {
        name:      d.lineName,
        startHour: d.startHour ?? 3,
        endHour:   d.endHour   ?? 27,
        stations:  d.stations,
        trains:    d.trains,
      };
      const opt = document.createElement('option');
      opt.value = d.lineKey;
      opt.textContent = d.lineName;
      select.appendChild(opt);
      select.value = d.lineKey;
      currentLine = LINES[d.lineKey];
      updateLineChrome();
      applySidebarWidth(calcSidebarWidth(d.stations));
      updateDataSummary(`1路線 / ${d.trains.length}本`);
      loadingMsg.textContent = `ローカルデータ読込完了（${d.trains.length}本）`;
    }

    setTimeout(() => {
      resizeAll();
      drawAll();
      document.getElementById('loading').classList.add('hidden');
    }, 300);
    return;
  }

  // ② ローカルデータなし → API 直接取得（CORS オフ起動が必要）
  try {
    loadingMsg.textContent = 'JR東海サーバーからデータ取得中...';
    const trains = await fetchIidaTrains();
    if (trains.length === 0) throw new Error('列車データが0件');
    LINES.iida.trains = trains;
    updateDataSummary(`1路線 / ${trains.length}本`);
    loadingMsg.textContent = `${trains.length}本の列車データを取得しました`;
  } catch (e) {
    console.warn('API取得失敗（fetch-diagram.ts を先に実行してください）:', e);
    loadingMsg.textContent = 'データ未取得。fetch-diagram.ts を実行してください。';
    LINES.iida.trains = IIDA_TRAINS_FALLBACK;
    updateDataSummary(`1路線 / ${IIDA_TRAINS_FALLBACK.length}本`);
    await new Promise(r => setTimeout(r, 2000));
  }
  currentLine = LINES.iida;
  updateLineChrome();
  applySidebarWidth(calcSidebarWidth(currentLine.stations));
  resizeAll();
  drawAll();
  document.getElementById('loading').classList.add('hidden');
})();
</script>
